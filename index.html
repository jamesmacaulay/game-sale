<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Sale</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #111111;
      --surface: #1c1c1c;
      --surface2: #272727;
      --border: #3a3a3a;
      --accent: #d4d4d4;
      --accent2: #555555;
      --text: #e8e8e8;
      --muted: #888888;
      --sold: #f87171;
      --radius: 10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1.5rem 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.01em;
    }
    header p {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 0.15rem;
    }

    /* ── Layout ── */
    .shell {
      display: flex;
      min-height: calc(100vh - 73px);
    }

    /* ── Sidebar filters ── */
    aside {
      width: 220px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 1.5rem 1rem;
      position: sticky;
      top: 73px;
      height: calc(100vh - 73px);
      overflow-y: auto;
    }
    aside h2 {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }
    .filter-btn {
      display: block;
      width: 100%;
      text-align: left;
      background: none;
      border: none;
      color: var(--text);
      font-size: 0.85rem;
      padding: 0.45rem 0.6rem;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .filter-btn:hover { background: var(--surface2); }
    .filter-btn.active { background: var(--accent2); color: #fff; font-weight: 600; }
    .filter-count {
      float: right;
      font-size: 0.75rem;
      color: var(--muted);
      background: var(--surface2);
      border-radius: 999px;
      padding: 0 6px;
      line-height: 1.6;
    }
    .filter-btn.active .filter-count { background: rgba(255,255,255,0.2); color: #fff; }

    /* ── Main grid ── */
    main {
      flex: 1;
      padding: 1.5rem;
    }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }
    #search {
      flex: 1;
      max-width: 360px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.9rem;
      padding: 0.5rem 0.85rem;
      outline: none;
      transition: border-color 0.15s;
    }
    #search:focus { border-color: var(--accent); }
    #search::placeholder { color: var(--muted); }
    .result-count { font-size: 0.85rem; color: var(--muted); }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.1rem;
    }

    /* ── Product card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
      display: flex;
      flex-direction: column;
    }
    .card:hover {
      transform: translateY(-3px);
      border-color: var(--accent);
      box-shadow: 0 8px 24px rgba(167,139,250,0.12);
    }
    .card-thumb {
      aspect-ratio: 3/4;
      overflow: hidden;
      background: var(--bg);
      position: relative;
    }
    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s;
    }
    .card:hover .card-thumb img { transform: scale(1.04); }
    .photo-count {
      position: absolute;
      bottom: 6px;
      right: 6px;
      background: rgba(0,0,0,0.65);
      color: #fff;
      font-size: 0.7rem;
      padding: 2px 6px;
      border-radius: 999px;
      pointer-events: none;
    }
    .card-body {
      padding: 0.75rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .card-cat {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--accent);
    }
    .card-title {
      font-size: 0.88rem;
      font-weight: 600;
      line-height: 1.3;
    }
    .card-pub {
      font-size: 0.75rem;
      color: var(--muted);
    }
    .card-price {
      margin-top: auto;
      padding-top: 0.5rem;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--accent);
    }
    .card-price.tbd { color: var(--muted); font-weight: 400; font-style: italic; }

    /* ── Empty state ── */
    .empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
    }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      max-width: 1100px;
      width: 100%;
      max-height: 90vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 1.1rem 1.4rem;
      border-bottom: 1px solid var(--border);
      gap: 1rem;
    }
    .modal-title-group {}
    .modal-cat {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--accent);
      margin-bottom: 0.2rem;
    }
    .modal-title {
      font-size: 1.15rem;
      font-weight: 700;
    }
    .modal-pub {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 0.15rem;
    }
    .modal-price-wrap {
      text-align: right;
      flex-shrink: 0;
    }
    .modal-price {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--accent);
    }
    .modal-price.tbd { color: var(--muted); font-size: 0.9rem; font-style: italic; font-weight: 400; }
    .modal-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.5rem;
      cursor: pointer;
      line-height: 1;
      padding: 0.2rem;
      margin-left: 0.5rem;
      flex-shrink: 0;
    }
    .modal-close:hover { color: var(--text); }

    .modal-body {
      display: flex;
      gap: 0;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    /* Gallery area */
    .gallery-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      background: var(--bg);
    }
    .gallery-hero {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    .gallery-hero img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
    }
    .gallery-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.5);
      border: none;
      color: #fff;
      font-size: 1.5rem;
      padding: 0.4rem 0.7rem;
      cursor: pointer;
      border-radius: 6px;
      opacity: 0.7;
      transition: opacity 0.15s;
    }
    .gallery-nav:hover { opacity: 1; }
    .gallery-nav.prev { left: 8px; }
    .gallery-nav.next { right: 8px; }
    .gallery-nav:disabled { opacity: 0.15; cursor: default; }

    .gallery-thumbs {
      display: flex;
      gap: 6px;
      padding: 8px 10px;
      overflow-x: auto;
      background: var(--surface2);
      border-top: 1px solid var(--border);
    }
    .gallery-thumbs::-webkit-scrollbar { height: 4px; }
    .gallery-thumbs::-webkit-scrollbar-track { background: transparent; }
    .gallery-thumbs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .thumb-btn {
      flex-shrink: 0;
      width: 52px;
      height: 52px;
      border-radius: 5px;
      overflow: hidden;
      border: 2px solid transparent;
      cursor: pointer;
      background: none;
      padding: 0;
      transition: border-color 0.15s;
    }
    .thumb-btn img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .thumb-btn.active { border-color: var(--accent); }

    /* ── Info panel ── */
    .info-panel {
      width: 320px;
      flex-shrink: 0;
      border-left: 1px solid var(--border);
      background: var(--surface);
      padding: 1.1rem 1.3rem;
      overflow-y: auto;
      font-size: 0.85rem;
      line-height: 1.55;
    }
    .info-panel::-webkit-scrollbar { width: 6px; }
    .info-panel::-webkit-scrollbar-track { background: transparent; }
    .info-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .info-desc {
      color: var(--text);
      margin-bottom: 1rem;
    }
    .info-meta {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0.35rem 0.9rem;
      font-size: 0.8rem;
      padding-top: 0.85rem;
      border-top: 1px solid var(--border);
    }
    .info-meta dt {
      color: var(--muted);
      text-transform: uppercase;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      align-self: center;
    }
    .info-meta dd {
      color: var(--text);
      word-break: break-word;
    }
    .info-notes {
      margin-top: 0.9rem;
      padding-top: 0.85rem;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-style: italic;
      font-size: 0.8rem;
    }

    /* ── Responsive ── */
    @media (max-width: 820px) {
      .modal-body { flex-direction: column; }
      .info-panel {
        width: 100%;
        border-left: none;
        border-top: 1px solid var(--border);
        max-height: 40vh;
      }
    }
    @media (max-width: 640px) {
      aside { display: none; }
    }
  </style>
</head>

// ─────────────────────────────────────────────
// CATEGORIES (order controls sidebar order)
const CATEGORIES = [
  "Board Games",
  "D&D",
  "Pathfinder",
  "World of Darkness",
  "Mind's Eye Theatre",
  "Warhammer 40K",
  "Other RPGs",
  "RPG Accessories",
];

// ─────────────────────────────────────────────
// STATE
let activeCategory = "All";
let searchQuery = "";
let modalProductId = null;
let galleryIndex = 0;

// ─────────────────────────────────────────────
// HELPERS
function filtered() {
  return PRODUCTS.filter(p => {
    const matchCat = activeCategory === "All" || p.category === activeCategory;
    const q = searchQuery.toLowerCase();
    const matchSearch = !q || [p.title, p.publisher, p.system, p.category, p.notes]
      .some(s => s && s.toLowerCase().includes(q));
    return matchCat && matchSearch;
  });
}

function priceLabel(p, extraClass) {
  const cls = extraClass || "";
  if (p.price === null) return "";
  if (p.price === "SOLD") return `<span class="card-price ${cls}" style="color:var(--sold)">Sold</span>`;
  return `<span class="card-price ${cls}">${p.price}</span>`;
}

function imgSrc(filename) {
  return `images/${filename}`;
}

// ─────────────────────────────────────────────
// RENDER SIDEBAR
function renderSidebar() {
  const counts = {};
  PRODUCTS.forEach(p => { counts[p.category] = (counts[p.category] || 0) + 1; });
  const total = PRODUCTS.length;

  let html = `<h2>Category</h2>`;
  html += `<button class="filter-btn ${activeCategory==="All"?"active":""}" data-cat="All">
    All <span class="filter-count">${total}</span>
  </button>`;
  CATEGORIES.forEach(cat => {
    const n = counts[cat] || 0;
    if (!n) return;
    html += `<button class="filter-btn ${activeCategory===cat?"active":""}" data-cat="${cat}">
      ${cat} <span class="filter-count">${n}</span>
    </button>`;
  });
  document.getElementById("sidebar").innerHTML = html;

  document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      activeCategory = btn.dataset.cat;
      renderSidebar();
      renderGrid();
    });
  });
}

// ─────────────────────────────────────────────
// RENDER GRID
function renderGrid() {
  const results = filtered();
  document.getElementById("result-count").textContent =
    results.length === PRODUCTS.length
      ? `${PRODUCTS.length} items`
      : `${results.length} of ${PRODUCTS.length} items`;

  if (!results.length) {
    document.getElementById("grid").innerHTML = `<div class="empty">No items match your search.</div>`;
    return;
  }

  document.getElementById("grid").innerHTML = results.map(p => `
    <div class="card" data-id="${p.id}" tabindex="0" role="button" aria-label="View ${p.title}">
      <div class="card-thumb">
        <img src="${imgSrc(p.images[0])}" alt="${p.title}" loading="lazy" />
        ${p.images.length > 1 ? `<span class="photo-count">📷 ${p.images.length}</span>` : ""}
      </div>
      <div class="card-body">
        <div class="card-cat">${p.system}</div>
        <div class="card-title">${p.title}</div>
        <div class="card-pub">${p.publisher}</div>
        ${priceLabel(p)}
      </div>
    </div>
  `).join("");

  document.querySelectorAll(".card").forEach(card => {
    const open = () => openModal(parseInt(card.dataset.id));
    card.addEventListener("click", open);
    card.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") open(); });
  });
}

// ─────────────────────────────────────────────
// MODAL
function openModal(id) {
  const p = PRODUCTS.find(x => x.id === id);
  if (!p) return;
  modalProductId = id;
  galleryIndex = 0;

  document.getElementById("modal-cat").textContent = p.category + " · " + p.system;
  document.getElementById("modal-title").textContent = p.title;
  document.getElementById("modal-pub").textContent = p.publisher;

  renderInfoPanel(p);

  const priceEl = document.getElementById("modal-price");
  if (p.price === null) {
    priceEl.textContent = "";
    priceEl.className = "modal-price";
    priceEl.style.color = "";
  } else if (p.price === "SOLD") {
    priceEl.textContent = "Sold";
    priceEl.className = "modal-price";
    priceEl.style.color = "var(--sold)";
  } else {
    priceEl.textContent = p.price;
    priceEl.className = "modal-price";
    priceEl.style.color = "";
  }

  renderGallery(p);
  document.getElementById("modal-overlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function renderInfoPanel(p) {
  const panel = document.getElementById("info-panel");
  const metaRows = [];
  if (p.year) metaRows.push(["Year", p.year]);
  if (p.edition) metaRows.push(["Edition", p.edition]);
  if (p.pages) metaRows.push(["Pages", p.pages]);
  if (p.isbn) metaRows.push(["ISBN", p.isbn]);
  if (p.stock) metaRows.push(["Stock #", p.stock]);

  const metaHtml = metaRows.length
    ? `<dl class="info-meta">${metaRows.map(([k,v]) => `<dt>${k}</dt><dd>${v}</dd>`).join("")}</dl>`
    : "";

  panel.innerHTML = `
    ${p.description ? `<div class="info-desc">${p.description}</div>` : ""}
    ${metaHtml}
    ${p.notes ? `<div class="info-notes">${p.notes}</div>` : ""}
  `;
}

function renderGallery(p) {
  const img = document.getElementById("gallery-img");
  img.src = imgSrc(p.images[galleryIndex]);
  img.alt = `${p.title} — photo ${galleryIndex + 1}`;

  document.getElementById("gallery-prev").disabled = galleryIndex === 0;
  document.getElementById("gallery-next").disabled = galleryIndex === p.images.length - 1;

  const thumbsEl = document.getElementById("gallery-thumbs");
  thumbsEl.innerHTML = p.images.map((f, i) => `
    <button class="thumb-btn ${i === galleryIndex ? "active" : ""}" data-i="${i}">
      <img src="${imgSrc(f)}" alt="Photo ${i+1}" loading="lazy" />
    </button>
  `).join("");
  thumbsEl.querySelectorAll(".thumb-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      galleryIndex = parseInt(btn.dataset.i);
      renderGallery(p);
    });
  });
}

function closeModal() {
  document.getElementById("modal-overlay").classList.remove("open");
  document.body.style.overflow = "";
  modalProductId = null;
}

function galleryNav(dir) {
  const p = PRODUCTS.find(x => x.id === modalProductId);
  if (!p) return;
  galleryIndex = Math.max(0, Math.min(p.images.length - 1, galleryIndex + dir));
  renderGallery(p);
}

// ─────────────────────────────────────────────
// EVENTS
document.getElementById("modal-close").addEventListener("click", closeModal);
document.getElementById("modal-overlay").addEventListener("click", e => {
  if (e.target === document.getElementById("modal-overlay")) closeModal();
});
document.getElementById("gallery-prev").addEventListener("click", () => galleryNav(-1));
document.getElementById("gallery-next").addEventListener("click", () => galleryNav(1));
document.addEventListener("keydown", e => {
  if (!document.getElementById("modal-overlay").classList.contains("open")) return;
  if (e.key === "Escape") closeModal();
  if (e.key === "ArrowLeft") galleryNav(-1);
  if (e.key === "ArrowRight") galleryNav(1);
});
document.getElementById("search").addEventListener("input", e => {
  searchQuery = e.target.value;
  renderGrid();
});

// ─────────────────────────────────────────────
// INIT
renderSidebar();
renderGrid();
</script>
